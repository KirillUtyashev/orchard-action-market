env:
  height: 3
  width: 3
  n_agents: 2
  n_apples: 3          # starting apples
  gamma: 0.99
  r_picker: -1.0
  force_pick: true
  max_apples: 4
  type: stochastic
  stochastic:
    spawn_prob: 0.1
    despawn_mode: probability
    despawn_prob: 0.01
    apple_lifetime: 20

model:
  input_type: cnn_grid
  k: 4
  model_type: cnn
  conv_specs: [[4, 3], [4, 3]]
  mlp_dims: [128, 64]

train:
  mode: policy_learning
  td_target: after_state
  total_steps: 30000
  train_method: backward_view   # or "nstep"
  nstep: 1
  td_lambda: 0.4 
  seed: 42
  lr:
    start: 0.01
    end: 1e-4
    schedule: linear
  policy_learning:
    epsilon:
      start: 1
      end: 1
      schedule: linear

eval:
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50

logging:
  main_csv_freq: 1000
  detail_csv_freq: 1000
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/runs/3x3/tests