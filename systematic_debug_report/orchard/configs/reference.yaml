# =============================================================================
# Orchard RL — Reference Config
# =============================================================================
# Every parameter with its type, default, and meaning.
# Copy this file and delete what you don't need.
# =============================================================================

env:
  height: 9                    # int — grid rows
  width: 9                     # int — grid columns
  n_agents: 4                  # int — number of agents (each takes turns acting)
  n_tasks: 4                   # int — starting task count per type (or total if n_task_types=1)
                               #   Backward compat: "n_apples" also accepted
  gamma: 0.99                  # float — discount factor per turn (0 < gamma ≤ 1)

  # --- Task specialization (n_task_types > 1) ---
  n_task_types: 4              # int — T, number of distinct task types (default: 1 = legacy mode)
  r_high: 1.0                  # float — reward for picking correct task type (τ ∈ G_actor)
  r_low: 0.0                   # float — reward for picking wrong task type (τ ∉ G_actor)
                               #   0.0 = soft obstacle; -1.0 = punishment
  max_tasks_per_type: 3        # int — n_τ^max, max tasks of each type on grid

  # Task assignments: specify ONE of rho or task_assignments (not both).
  # If neither specified: all agents care about all types (rho=1).
  rho: 0.25                    # float — specialization parameter. |G_i| = round(rho * T).
                               #   0.25 with T=4 → each agent owns 1 type
                               #   0.5  with T=4 → each agent owns 2 types
                               #   1.0  → all agents own all types (homogeneous)
                               #   Must satisfy: rho * T is near-integer, rho ≥ 1/T
  # task_assignments: [[0], [1], [2], [3]]
                               # list[list[int]] — explicit G_i for each agent
                               #   Every type must be covered by at least one agent

  # --- Pick mode ---
  pick_mode: forced            # PickMode: "forced" | "choice"
                               #   forced — auto-pick when stepping on task cell. At most 1 task per cell.
                               #   choice — explicit pick(τ) action required. Multiple types per cell allowed.
                               #   Backward compat: "force_pick: true/false" also accepted

  # --- Legacy reward (n_task_types == 1 only) ---
  r_picker: 1.0                # float — reward to picker. Others get (1 - r_picker) / (N-1).
  max_tasks: 12                # int — total hard cap on tasks on grid (legacy mode)
                               #   Backward compat: "max_apples" also accepted

  type: stochastic             # EnvType: "deterministic" | "stochastic"
  stochastic:
    spawn_prob: 0.04           # float — probability each empty cell spawns a task per type per turn
                               #   With T types all under cap, effective rate is ~T × spawn_prob
    despawn_mode: probability  # DespawnMode: "none" | "probability"
    despawn_prob: 0.05         # float — per-task per-turn despawn probability

model:
  input_type: task_cnn_grid    # EncoderType — options:
                               # --- Decentralized ---
                               #   "cnn_grid"              — 4 channels (legacy: apples/self/others/actor)
                               #   "task_cnn_grid"         — T+3 channels (per-type tasks/self/others/actor)
                               #   "egocentric_cnn_grid"   — ego-centric 4-channel grid
                               #   "no_redundant_agent_grid" — 4-channel, actor removed from self/others
                               #   "relative"              — sorted relative dists (MLP only)
                               #   "relative_k"            — K-nearest relative dists (MLP only)
                               #   "grid_mlp"              — flattened 4-channel grid as MLP input
                               # --- Centralized ---
                               #   "centralized_cnn_grid"      — 3 channels (legacy: apples/agents/actor)
                               #   "centralized_task_cnn_grid" — T+N+1 channels (per-type/per-agent/actor)
  model_type: cnn              # ModelType: "mlp" | "cnn"
  conv_specs: [[16, 3]]       # list[[out_channels, kernel_size]] per conv layer
  mlp_dims: [64]               # list[int] — MLP hidden layers ([] = no MLP head, conv output → linear)
  activation: leaky_relu       # "relu" | "leaky_relu" | "none"
  weight_init: zero_bias       # "default" | "zero_bias"
  k: 5                         # int — only for relative_k encoder

train:
  learning_type: decentralized # "decentralized" | "centralized"
  mode: policy_learning        # "value_learning" | "policy_learning" | "reward_learning"
  td_target: after_state       # "pre_action" | "after_state"
  train_method: backward_view  # "backward_view" | "nstep"
  td_lambda: 0.3               # float — λ for TD(λ) backward view
  total_steps: 2000000         # int — total environment steps
  seed: 1234                   # int — RNG seed
  batch_actions: true          # bool — use batched encoding+forward for action selection (faster)
  heuristic: nearest_correct_task
                               # Heuristic: "nearest_task" | "nearest_correct_task"
                               #   Used for value_learning policy and eval baseline.
                               #   Default: nearest_correct_task when n_task_types>1, nearest_task otherwise.
  use_vmap: false              # bool — use vmap for batched forward passes (future optimization)

  # --- Stopping conditions ---
  stopping_condition: running_max_rps
                               # "none" | "running_max_pps" | "running_min_mae" | "running_max_rps"
                               #   running_max_pps — legacy, stops on picks-per-step plateau
                               #   running_max_rps — for task specialization, stops on reward-per-step plateau
                               #   running_min_mae — for reward learning, stops on MAE plateau
  patience_steps: 200000       # int — steps without improvement before stopping
  improvement_threshold: 1e-7  # float — minimum improvement to reset patience counter
  min_steps_before_stop: 400000 # int — minimum training steps before allowing early stop

  lr:
    start: 0.001
    end: 0.001
    schedule: none             # "none" | "linear" | "step"
    step_start: 100000
    step_size: 5000
    step_factor: 0.5

  value_learning:
    reset_freq: 20             # int — reset env to init_state every N steps

  policy_learning:
    epsilon:
      start: 0.05
      end: 0.05
      schedule: none

eval:
  rollout_len: 2000            # int — steps per rollout for ground-truth V computation
  eval_steps: 1000             # int — steps for picks/reward-per-step measurement
  n_test_states: 50            # int — test states for value/reward learning evaluation
  checkpoint_freq: 0           # int — save checkpoint every N steps; 0 = final only

logging:
  output_dir: runs/            # str — base directory; each run creates timestamped subfolder
  main_csv_freq: 10000         # int — write metrics.csv every N steps (expensive for policy_learning)
  detail_csv_freq: 10000       # int — write details.csv every N steps
