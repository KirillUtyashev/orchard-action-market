# ============================================================================
# Orchard Config Reference
# ============================================================================
# Every field explained. Copy this and modify for your experiments.

env:
  height: 9                        # grid rows
  width: 9                         # grid columns
  n_agents: 4                      # total agents N
  n_task_types: 2                  # T: number of distinct task types
  n_tasks: 10                      # initial tasks spawned per type at env.init_state()
  max_tasks_per_type: 10           # cap: spawning stops when this many of type τ exist
  gamma: 0.99                      # discount factor for move turns (pick turns use γ=1)

  # Reward structure (φ/R framework):
  #
  #   R[i,j] = 1[ |i - j| <= clustering ]
  #     — who shares reward with whom. clustering=0: each agent rewards only itself.
  #       clustering=N-1: all agents share each other's rewards.
  #
  #   phi[i,κ] = 1[ |i - κ| <= specialization ]
  #     — which task types agent i can profitably pick. specialization=0: agent i
  #       can only pick type i (mod T). specialization=T-1: any agent can pick any type.
  #
  #   category_rewards r'[κ,j]: stochastic T×N reward matrix, sampled once at env
  #     construction from Normal(1, sigma_b²) + agent noise Normal(0, sigma_a²).
  #     sigma_a=sigma_b=0 → r'[κ,j]=1 for all κ,j (homogeneous rewards).
  #
  #   Pick reward formula: r_j = phi[actor,κ] * R[actor,j] * r'[κ,j]
  #
  clustering: 0                    # C: reward-sharing radius; 0 = no sharing
  specialization: 0                # S: task-type eligibility radius; 0 = strict assignment

  # Stochastic spawning/despawning (required):
  stochastic:
    spawn_prob: 0.01               # probability per empty cell per type per turn
    despawn_prob: 0.0125           # probability each existing task despawns per turn
    despawn_mode: probability      # "probability" or "none"
    spawn_on_agent_cells: false    # if true, agents do not block task spawning
    spawn_at_round_end: false      # if true, spawn/despawn only fires after the last agent acts
    sigma_a: 0.0                   # agent-level noise in category_rewards (Normal std)
    sigma_b: 0.0                   # category-level baseline noise in category_rewards (Normal std)

model:
  # Encoder: how the grid state is converted to neural network input
  #
  #   general_dec_cnn_grid:  decentralized; each agent's encoding is personalised
  #                          using its own phi, R, and category_rewards values.
  #                          Grid: T+3 channels. Scalars: 3.
  #
  #   general_cen_cnn_grid:  centralized (single shared network); encoding
  #                          contains the full joint state with optimal task values.
  #                          Grid: T+N+1 channels. Scalars: N+1.
  #
  #   everything_cnn_grid:   raw binary positions only — no pre-calculated phi,
  #                          R, or reward values appear anywhere in the encoding.
  #                          Agents must discover structure entirely from the team
  #                          reward signal. Compatible with both centralized and
  #                          decentralized learning (n_networks is derived
  #                          automatically from train.learning_type).
  #                          Grid: T+N+1 channels. Scalars: N+1.
  encoder: general_dec_cnn_grid

  # CNN architecture: list of [output_channels, kernel_size] per conv layer
  # Padding is always kernel_size // 2 (same-padding), so spatial dims don't shrink
  conv_specs: [[16, 3]]

  # MLP hidden dims after conv flatten + scalar concat
  # [] means no hidden layers (conv output → linear → 1)
  # [16] means one hidden layer with 16 units
  # [64, 64] means two hidden layers
  mlp_dims: [16]

  # Activation function: leaky_relu or relu or none
  activation: leaky_relu

  # Weight initialization: zero_bias zeros all bias terms; default leaves pytorch defaults
  weight_init: zero_bias

# Optional actor-specific model config for actor-critic runs.
# If omitted, actor networks reuse the critic model config above.
# The encoder must match model.encoder because orchard initializes one encoder singleton.
actor_model: null

train:
  # Learning type determines number of networks:
  #   decentralized: N networks, one per agent (agent i's network only sees agent i's encoding)
  #   centralized: 1 network shared by all agents (sees full state)
  learning_type: decentralized

  # Device: true=GPU (BatchedTrainer + vmap), false=CPU (sequential forwards)
  use_gpu: false

  # TD(λ) eligibility trace decay. 0=TD(0), 1=Monte Carlo-ish.
  td_lambda: 0.3

  total_steps: 10000000            # maximum training steps (may stop early)
  seed: 1234                       # RNG seed for reproducibility

  # Heuristic baseline policy used for eval comparison
  # Options: nearest
  heuristic: nearest

  # Discount timing method:
  #   team_steps:  γ applied every step an agent acts (own steps only). Default for dec.
  #   round_steps: γ applied once per full N-agent round (first step of each cycle).
  #                Required for centralized, and for train_only_teammates=true with
  #                multiple teams (ensures cen = Σ dec over round boundaries).
  discount_method: team_steps

  # If true, only update network j when R(actor, j) > 0 (env.teammate_mask).
  # Each team maintains its own TD prev-state so stranger steps don't corrupt the trace.
  # Pair with discount_method: round_steps when using multiple teams.
  train_only_teammates: false

  # Learning rate schedule for SGD
  lr:
    start: 9e-3                    # initial (and constant if schedule=none)
    end: 9e-3                      # final value (only used if schedule=linear)
    schedule: none                 # none=constant, linear=decay from start to end
    # step_size: 0                 # for schedule=step: decay every N steps
    # step_factor: 1.0             # for schedule=step: multiply by this factor
    # step_start: 0                # for schedule=step: start stepping after this step

  # Epsilon-greedy exploration rate
  # Used by algorithm.name=value only. Actor-critic samples directly from the actor policy.
  epsilon:
    start: 0.05                    # initial exploration rate
    end: 0.05                      # final (only used if schedule=linear)
    schedule: none                 # none=constant, linear=decay

  # Training algorithm:
  #   value: current after-state value learning
  #   actor_critic: decentralized masked-policy actor-critic
  algorithm:
    name: actor_critic

  # Optional actor LR schedule for actor-critic.
  # If omitted, actor networks reuse train.lr.
  actor_lr:
    start: 3e-3
    end: 3e-3
    schedule: none

  # Optional actor-critic mode: keep critics fixed and train only the actor.
  freeze_critic: false

  # Number of initial steps where critic and actor weight updates are skipped.
  warmup_steps: 0

  # Optional following-rate extension for actor-critic only.
  following_rates:
    enabled: false                 # requires algorithm.name=actor_critic
    budget: 1.0                    # communication-rate budget per follower
    rho: 0.5                       # EMA factor for alpha updates
    reallocation_freq: 1           # reallocate every N actor decisions
    solver: closed_form            # closed_form or scipy
    fixed: false                   # true = keep initial rates fixed

  # Optional external influencer extension layered on following-rates.
  influencer:
    enabled: false                 # requires following_rates.enabled=true
    budget: 0.5                    # influencer communication-rate budget

  # Early stopping: stop training if metric doesn't improve
  stopping:
    condition: running_max_rps     # "running_max_rps" or "none"
    patience_steps: 1000000        # stop after this many steps without improvement
    improvement_threshold: 1e-7    # minimum improvement to count as "better"
    min_steps_before_stop: 3000000 # never stop before this many steps

eval:
  eval_steps: 1000                 # steps per eval rollout (greedy + heuristic)
  n_test_states: 50                # number of states for value diagnostics
  checkpoint_freq: 100000          # save model every N steps (0=final only)

logging:
  output_dir: output/runs/         # base directory; timestamped subfolder created
  main_csv_freq: 10000             # write metrics.csv every N steps
  detail_csv_freq: 50000           # write details.csv (weight norms, etc.) every N steps
  timing_csv_freq: 10000           # write timing.csv every N steps (0=disable)
