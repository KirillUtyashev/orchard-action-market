# Centralized, 4 agents, 2 task types
# Cen → CPU trainer automatically

env:
  height: 9
  width: 9
  n_agents: 4
  n_task_types: 2
  n_tasks: 10
  max_tasks_per_type: 10
  gamma: 0.99
  r_picker: -1.0
  r_low: -1.0
  pick_mode: choice
  task_assignments: [[0],[0],[1],[1]] # list i is agent i.
  stochastic:
    spawn_prob: 0.01
    despawn_prob: 0.0125

model:
  encoder: centralized_task_cnn_grid
  conv_specs: [[16, 3]]
  mlp_dims: [16]
  activation: leaky_relu
  weight_init: zero_bias

train:
  learning_type: centralized
  td_lambda: 0.3
  total_steps: 100
  seed: 1234
  heuristic: nearest_correct_task_stay_wrong
  comm_weight: 0.0
  lr:
    start: 9e-3
    end: 9e-3
  epsilon:
    start: 0.05
    end: 0.05
  stopping:
    condition: running_max_rps
    patience_steps: 500000
    improvement_threshold: 1e-7
    min_steps_before_stop: 2000000

eval:
  rollout_len: 1
  eval_steps: 1
  n_test_states: 1
  checkpoint_freq: 0

logging:
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/test_runs
  main_csv_freq: 1
  detail_csv_freq: 1
