env:
  height: 6
  width: 6
  n_agents: 2
  n_tasks: 9
  n_task_types: 1
  gamma: 0.99
  r_picker: -1.0
  r_low: -1.0
  max_tasks_per_type: 9
  pick_mode: choice
  task_assignments: [[0],[0]]
  type: stochastic
  stochastic:
    spawn_prob: 0.01
    despawn_mode: probability
    despawn_prob: 0.0125
model:
  input_type: task_cnn_grid
  model_type: cnn
  conv_specs: [[8, 3]]
  mlp_dims: []
train:
  mode: policy_learning
  td_target: after_state
  total_steps: 100
  seed: 42
  lr:
    start: 0.001
    schedule: none
  policy_learning:
    epsilon:
      start: 0.05
      end: 0.05
      schedule: none