env:
  height: 9
  width: 9
  n_agents: 4
  n_tasks: 4
  n_task_types: 1
  gamma: 0.99
  r_picker: 1.0
  pick_mode: forced
  max_tasks: 20
  type: stochastic
  stochastic:
    spawn_prob: 0.04
    despawn_mode: probability
    despawn_prob: 0.05
model:
  input_type: cnn_grid
  model_type: cnn
  conv_specs: [[1, 3]]
  mlp_dims: []
  activation: leaky_relu
  weight_init: zero_bias
train:
  learning_type: decentralized
  mode: policy_learning
  td_target: after_state
  train_method: backward_view
  td_lambda: 0.3
  total_steps: 2000000
  seed: 1234
  batch_actions: true
  heuristic: nearest_task
  use_vmap: true
  stopping_condition: running_max_rps
  patience_steps: 200000
  improvement_threshold: 1e-7
  min_steps_before_stop: 400000
  lr:
    start: 0.001
    end: 0.001
    schedule: none
  policy_learning:
    epsilon:
      start: 0.05
      end: 0.05
      schedule: none
eval:
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50
  checkpoint_freq: 0
logging:
  output_dir: runs/
  main_csv_freq: 10000
  detail_csv_freq: 50000
