env:
  height: 12
  width: 12
  n_agents: 7
  n_apples: 36
  gamma: 0.99
  r_picker: -1.0
  force_pick: true
  max_apples: 36
  type: stochastic
  stochastic:
    spawn_prob: 0.04
    despawn_mode: probability
    despawn_prob: 0.01
    apple_lifetime: 20

model:
  input_type: cnn_grid
  model_type: cnn
  mlp_dims: [64, 64]
  conv_specs: [[16, 3], [16, 3]]

train:
  learning_type: decentralized
  mode: policy_learning
  td_target: after_state
  train_method: backward_view
  total_steps: 10000000
  seed: 42
  nstep: 1
  td_lambda: 0.95
  lr:
    start: 0.0001
    end: 0.0001
    schedule: none
  policy_learning:
    epsilon:
      start: 1.0
      end: 1.0
      schedule: none
  stopping_condition: running_max_pps
  patience_steps: 1000000
  min_steps_before_stop: 1000000
  improvement_threshold: 1e-7

eval:
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50
  checkpoint_freq: 200000

logging:
  main_csv_freq: 100
  detail_csv_freq: 100
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/runs/12x12
