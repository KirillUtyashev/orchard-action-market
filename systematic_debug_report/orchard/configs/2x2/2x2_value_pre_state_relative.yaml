env:
  height: 2
  width: 2
  n_agents: 2
  n_apples: 1
  gamma: 0.9
  r_picker: -1.0
  force_pick: true
  max_apples: 1
  type: deterministic

model:
  input_type: relative
  model_type: mlp
  mlp_dims: [64, 64]

train:
  mode: value_learning
  td_target: pre_action
  total_steps: 10000
  seed: 42
  lr:
    start: 0.001
    end: 1e-5
    schedule: linear
  value_learning:
    reset_freq: 20

eval:
  freq: 1000
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50

logging:
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/runs/2x2_value
  main_csv_freq: 100
  detail_csv_freq: 100
