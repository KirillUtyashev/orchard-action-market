env:
  height: 2
  width: 2
  n_agents: 2
  n_apples: 2
  gamma: 0.9
  r_picker: -1.0
  force_pick: true
  max_apples: 2
  type: stochastic
  stochastic:
    spawn_prob: 0.1          # float — probability each empty cell spawns an apple per turn
                              #         expected new apples/turn ≈ spawn_prob × empty_cells
    despawn_mode: probability        # DespawnMode: "none" | "probability" | "lifetime"
                              #   none        — apples never despawn on their own
                              #   probability — each apple despawns with prob despawn_prob per turn
                              #   lifetime    — apple removed after apple_lifetime turns
    despawn_prob: 0.01        # float — per-apple per-turn despawn probability
                              #         only used when despawn_mode=probability
    apple_lifetime: 20        # int — turns until apple despawns
                              #         only used when despawn_mode=lifetime
model:
  input_type: cnn_grid
  model_type: cnn
  conv_specs: [[32, 3], [64, 3]]
  mlp_dims: [64, 64]

train:
  mode: policy_learning
  td_target: after_state
  total_steps: 10000
  nstep: 3
  seed: 42
  lr:
    start: 0.001
    end: 1e-5
    schedule: linear
  value_learning:
    reset_freq: 20
  policy_learning:
    epsilon:                  # exploration schedule (same structure as lr)
      start: 0.3              # float — initial exploration rate
      end: 0.05               # float — final exploration rate
      schedule: linear        # Schedule: "none" | "linear" | "step"
      step_size: 5000         # int — only for schedule=step
      step_factor: 0.5        # float — only for schedule=step

eval:
  freq: 1000
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50

logging:
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/runs/2x2/policy
  main_csv_freq: 100
  detail_csv_freq: 100
