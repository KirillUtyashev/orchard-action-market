# ═══════════════════════════════════════════════════════════════════════
# Base decentralized config for ε/λ sweep
# Step LR (const 400K → halve every 200K, no floor), 10M max, early stop
# LR, λ, ε overridden per job
# ═══════════════════════════════════════════════════════════════════════
env:
  height: 6
  width: 6
  n_agents: 2
  n_apples: 9
  gamma: 0.99
  r_picker: -1.0
  force_pick: true
  max_apples: 9
  type: stochastic
  stochastic:
    spawn_prob: 0.04
    despawn_mode: probability
    despawn_prob: 0.05
    apple_lifetime: 20

model:
  input_type: cnn_grid
  model_type: cnn
  mlp_dims: [16, 16]
  conv_specs: [[64, 3], [64, 3]]

train:
  learning_type: decentralized
  mode: policy_learning
  td_target: after_state
  train_method: backward_view
  total_steps: 1000
  seed: 1234
  nstep: 1
  td_lambda: 0.3
  lr:
    start: 0.001
    end: 0
    schedule: step
    step_start: 0
    step_size: 1
    step_factor: 0.5
  policy_learning:
    epsilon:
      start: 0.1
      end: 0.1
      schedule: none
  stopping_condition: none
  patience_steps: 1000000
  improvement_threshold: 1e-7
  min_steps_before_stop: 500000

eval:
  rollout_len: 2000
  eval_steps: 1000
  n_test_states: 50
  checkpoint_freq: 500000

logging:
  main_csv_freq: 10
  detail_csv_freq: 10
  output_dir: PLACEHOLDER
