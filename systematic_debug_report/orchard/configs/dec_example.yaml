# Decentralized, 4 agents, 2 task types, blind encoding
# Dec → GPU trainer (BatchedTrainer + vmap) automatically

env:
  height: 9
  width: 9
  n_agents: 4
  n_task_types: 2
  n_tasks: 10                          # initial tasks per type
  max_tasks_per_type: 10               # ongoing spawn cap per type
  gamma: 0.99
  r_picker: -1.0
  r_low: -1.0
  pick_mode: choice
  task_assignments: [[0],[0],[1],[1]]
  stochastic:
    spawn_prob: 0.01
    despawn_prob: 0.0125

model:
  encoder: blind_task_cnn_grid         # was input_type
  conv_specs: [[16, 3]]
  mlp_dims: [16]
  activation: leaky_relu
  weight_init: zero_bias

train:
  learning_type: decentralized         # dec → GpuTrainer, cen → CpuTrainer
  td_lambda: 0.3
  total_steps: 100
  seed: 1234
  heuristic: nearest_correct_task_stay_wrong
  comm_weight: 1
  lr:
    start: 9e-3
    end: 9e-3
  epsilon:
    start: 0.05
    end: 0.05
  stopping:
    condition: running_max_rps         # or "none"
    patience_steps: 1000000
    improvement_threshold: 1e-7
    min_steps_before_stop: 3000000

eval:
  rollout_len: 1
  eval_steps: 1
  n_test_states: 1
  checkpoint_freq: 100000

logging:
  output_dir: /u/taddmao/code/orchard-action-market/systematic_debug_report/test_runs
  main_csv_freq: 10000
  detail_csv_freq: 50000
