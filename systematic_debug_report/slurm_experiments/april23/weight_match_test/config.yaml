env:
  height: 6
  width: 6
  n_agents: 2
  n_tasks: 9
  n_task_types: 1
  gamma: 0.99
  r_picker: -1.0
  r_low: -1.0
  max_tasks_per_type: 9
  pick_mode: forced
  task_assignments: [[0], [0]]
  stochastic:
    spawn_prob: 0.04
    despawn_mode: probability
    despawn_prob: 0.05
    old_init_rng: true

model:
  encoder: cnn_grid
  conv_specs: [[8, 3]]
  mlp_dims: []
  activation: relu

train:
  learning_type: decentralized
  use_gpu: false
  total_steps: 10
  td_lambda: 0.3
  seed: 1234
  heuristic: nearest_task
  comm_weight: 1.0
  algorithm:
    name: value
  lr:
    start: 0.001
    end: 0.0
    schedule: step
    step_size: 200000
    step_factor: 0.5
    step_start: 200000
  epsilon:
    start: 0.05
    end: 0.05
    schedule: none
  stopping:
    condition: none

eval:
  checkpoint_freq: 1
  eval_steps: 0
  n_test_states: 0

logging:
  output_dir: runs/weight_match_test/
  main_csv_freq: 1
  detail_csv_freq: 1
  timing_csv_freq: 0
