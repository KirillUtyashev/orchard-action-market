name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [tadd_clean]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r systematic_debug_report/requirements.txt

      - name: Run tests
        run: |
          cd systematic_debug_report
          pytest --tb=short -q
